name: Deploy API Server

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API server
        working-directory: artifacts/api-server
        run: pnpm build
        env:
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Deploy to Railway
        uses: railway-app/deploy-action@v1
        with:
          railway-project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
          railway-environment-name: production
          service: api-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Create workflow summary
        run: |
          echo "✅ API Server Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Deployed to: Railway" >> $GITHUB_STEP_SUMMARY
          echo "📋 View deployment logs in Railway dashboard or Actions tab" >> $GITHUB_STEP_SUMMARY
