name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build APK with Expo
        working-directory: artifacts/mobile
        run: |
          npx expo prebuild --clean --platform android --no-install
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: career-compass-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create workflow summary
        run: |
          echo "✅ APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📱 Download APK:" >> $GITHUB_STEP_SUMMARY
          echo "Go to the Actions tab → click this run → Download 'career-compass-apk' artifact" >> $GITHUB_STEP_SUMMARY
